name: Deploy Web

# Builds the Vue app (VITE_API_BASE baked in) and deploys it to Azure Static Web Apps
# (dentshop-negotiator-dev). The deploy job targets the GitHub Environment 'dev' —
# add Required reviewers to that environment (repo Settings → Environments → dev)
# to get a manual approval gate.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Gate: type-check + production build. Deploy depends on this, so a broken build
  # (type errors, template errors) blocks the deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type-check & build
        run: npm run build

  deploy:
    needs: test                  # only deploy if the build passes
    runs-on: ubuntu-latest
    environment: dev             # manual approval gate (configure reviewers in repo settings)
    steps:
      - uses: actions/checkout@v4

      - name: Build & deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          action: upload
          app_location: "/"
          output_location: "dist"
        env:
          # Baked into the Vite build so the SPA calls the right API.
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
